; First-Light-Test fuer das eInk-Wanddashboard
; Board: Seeed XIAO ESP32-S3 (Plus) auf XIAO ePaper Driver Board EE04
; Panel: GDEM075F52 7.5" 800x480 BWRY (JD79665) ueber bb_epaper
[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; Native USB-CDC, damit Serial ueber den USB-Port erscheint (COM3)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
upload_port = COM3
monitor_port = COM3

; bb_epaper direkt von GitHub (Larry Bank / bitbank2) - die fuer dieses Panel empfohlene Lib
lib_deps =
    https://github.com/bitbank2/bb_epaper.git
