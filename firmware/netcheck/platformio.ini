; Netzwerk-Diagnose fuer das eInk-Dashboard — bleibt wach, kein Deep Sleep.
; Klaert: 2.4-GHz-Sichtbarkeit, WLAN-Verbindung, TCP-Erreichbarkeit des PCs, HTTP.
[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
upload_port = COM3
monitor_port = COM3
; USB-JTAG: RTS=0 (kein Reset). DTR=1, sonst sendet der HWCDC keine Ausgabe.
monitor_rts = 0
monitor_dtr = 1
