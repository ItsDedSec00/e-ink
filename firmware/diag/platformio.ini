; Diagnose direkt aufs eInk-Panel (umgeht das unzuverlaessige USB-CDC-Serial).
[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

upload_port = COM3

lib_deps =
    https://github.com/bitbank2/bb_epaper.git
